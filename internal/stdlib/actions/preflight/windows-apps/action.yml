name: preflight/windows-apps
version: "1.0.0"
description: Remove common built-in Windows apps
author: preflight

inputs:
  remove_xbox:
    type: bool
    default: true
    description: Remove built-in Xbox packages
  remove_cortana:
    type: bool
    default: true
    description: Remove Cortana package
  remove_news:
    type: bool
    default: true
    description: Remove Microsoft News package
  remove_weather:
    type: bool
    default: false
    description: Remove Microsoft Weather package
  remove_communications_apps:
    type: bool
    default: false
    description: Remove consumer communication apps such as Teams and Skype

tasks:
  - name: Remove Xbox apps
    when: "{{ vars.remove_xbox }}"
    remove_appx_packages:
      name: Microsoft.Xbox*
      scope: both
      ensure: absent

  - name: Remove Cortana
    when: "{{ vars.remove_cortana }}"
    remove_appx_packages:
      name: Microsoft.549981C3F5F10
      scope: both
      ensure: absent

  - name: Remove Microsoft News
    when: "{{ vars.remove_news }}"
    remove_appx_packages:
      name: Microsoft.BingNews
      scope: both
      ensure: absent

  - name: Remove Microsoft Weather
    when: "{{ vars.remove_weather }}"
    remove_appx_packages:
      name: Microsoft.BingWeather
      scope: both
      ensure: absent

  - name: Remove consumer communication apps
    when: "{{ vars.remove_communications_apps }}"
    remove_appx_packages:
      name: MicrosoftTeams*
      scope: both
      ensure: absent
