name: preflight/windows-quiet-mode
version: "2.4.0"
description: Reduce notifications, prompts, and Windows recovery UI noise
author: preflight

inputs:
  user:
    type: string
    default: ""
    description: Optional Windows user for user-scoped notification and prompt settings
  disable_notifications:
    type: bool
    default: true
    description: Turn off toast and cloud notifications with machine policy
  disable_news_and_interests:
    type: bool
    default: true
    description: Hide the Windows news and interests feed
  disable_error_reporting:
    type: bool
    default: true
    description: Disable Windows Error Reporting UI and submission
  disable_windows_setup_prompt:
    type: bool
    default: true
    description: Turn off Windows consumer and cloud-optimized prompt content
  disable_app_restore_on_boot:
    type: bool
    default: true
    description: Disable automatic restart sign-on after Windows Update restarts
  disable_app_suggestions:
    type: bool
    default: true
    description: Disable Windows consumer app suggestions and silent app installs for the selected user

tasks:
  - name: Configure notification policy
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\CurrentVersion\PushNotifications'
      values:
        - name: NoToastApplicationNotification
          type: dword
          data: "{{ vars.disable_notifications }}"
        - name: NoCloudApplicationNotification
          type: dword
          data: "{{ vars.disable_notifications }}"

  - name: Configure notification center for selected user
    registry:
      path: 'HKCU:\Software\Policies\Microsoft\Windows\Explorer'
      user: "{{ vars.user }}"
      values:
        - name: DisableNotificationCenter
          type: dword
          data: "{{ vars.disable_notifications ? 1 : 0 }}"

  - name: Configure toast notifications for selected user
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\PushNotifications'
      user: "{{ vars.user }}"
      values:
        - name: ToastEnabled
          type: dword
          data: "{{ vars.disable_notifications ? 0 : 1 }}"

  - name: Configure news and interests machine policy
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Feeds'
      values:
        - name: EnableFeeds
          type: dword
          data: "{{ vars.disable_news_and_interests ? 0 : 1 }}"

  - name: Disable Windows Error Reporting service
    when: "{{ vars.disable_error_reporting }}"
    powershell:
      check_script: |
        $svc = Get-CimInstance Win32_Service -Filter "Name='WerSvc'" -ErrorAction SilentlyContinue
        if ($null -eq $svc) { return $false }
        return ($svc.State -ne 'Stopped' -or $svc.StartMode -ne 'Disabled')
      script: |
        $svc = Get-CimInstance Win32_Service -Filter "Name='WerSvc'" -ErrorAction SilentlyContinue
        if ($null -ne $svc -and [int]$svc.ProcessId -gt 0) {
          Stop-Process -Id ([int]$svc.ProcessId) -Force -ErrorAction SilentlyContinue
        }
        Set-Service -Name WerSvc -StartupType Disabled -ErrorAction SilentlyContinue

  - name: Configure Windows Error Reporting
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Error Reporting'
      values:
        - name: Disabled
          type: dword
          data: "{{ vars.disable_error_reporting }}"
        - name: DontShowUI
          type: dword
          data: "{{ vars.disable_error_reporting }}"

  - name: Configure Windows Health Error Reporting
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\PCHealth\ErrorReporting'
      values:
        - name: ShowUI
          type: dword
          data: "{{ vars.disable_error_reporting == 'false' }}"

  - name: Configure Windows experience prompts
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\CloudContent'
      values:
        - name: DisableWindowsConsumerFeatures
          type: dword
          data: "{{ vars.disable_windows_setup_prompt }}"
        - name: DisableCloudOptimizedContent
          type: dword
          data: "{{ vars.disable_windows_setup_prompt }}"

  - name: Configure selected user setup prompt
    registry:
      path: 'HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\UserProfileEngagement'
      user: "{{ vars.user }}"
      values:
        - name: ScoobeSystemSettingEnabled
          type: dword
          data: "{{ vars.disable_windows_setup_prompt ? 0 : 1 }}"

  - name: Configure selected user app suggestions
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager'
      user: "{{ vars.user }}"
      values:
        - name: FeatureManagementEnabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: OemPreInstalledAppsEnabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: PreInstalledAppsEnabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: SilentInstalledAppsEnabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: ContentDeliveryAllowed
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: PreInstalledAppsEverEnabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: SubscribedContentEnabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: SubscribedContent-338388Enabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: SubscribedContent-338389Enabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: SubscribedContent-314559Enabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: SubscribedContent-338387Enabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: SubscribedContent-338393Enabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: SubscribedContent-310093Enabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: SystemPaneSuggestionsEnabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"
        - name: SoftLandingEnabled
          type: dword
          data: "{{ vars.disable_app_suggestions ? 0 : 1 }}"

  - name: Configure automatic restart sign-on
    registry:
      path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System'
      values:
        - name: DisableAutomaticRestartSignOn
          type: dword
          data: "{{ vars.disable_app_restore_on_boot }}"
