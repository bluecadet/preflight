name: preflight/windows-quiet-mode
version: "2.1.0"
description: Reduce notifications, prompts, and Windows recovery UI noise
author: preflight

inputs:
  disable_notifications:
    type: bool
    default: true
    description: Turn off toast and cloud notifications with machine policy
  disable_error_reporting:
    type: bool
    default: true
    description: Disable Windows Error Reporting UI and submission
  disable_windows_setup_prompt:
    type: bool
    default: true
    description: Turn off Windows consumer and cloud-optimized prompt content
  disable_app_restore_on_boot:
    type: bool
    default: true
    description: Disable automatic restart sign-on after Windows Update restarts

tasks:
  - name: Configure notification policy
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\CurrentVersion\PushNotifications'
      values:
        - name: NoToastApplicationNotification
          type: dword
          data: "{{ vars.disable_notifications }}"
        - name: NoCloudApplicationNotification
          type: dword
          data: "{{ vars.disable_notifications }}"

  - name: Configure Windows Error Reporting
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Error Reporting'
      values:
        - name: Disabled
          type: dword
          data: "{{ vars.disable_error_reporting }}"
        - name: DontShowUI
          type: dword
          data: "{{ vars.disable_error_reporting }}"

  - name: Configure Windows Health Error Reporting
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\PCHealth\ErrorReporting'
      values:
        - name: ShowUI
          type: dword
          data: "{{ vars.disable_error_reporting == 'false' }}"

  - name: Configure Windows experience prompts
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\CloudContent'
      values:
        - name: DisableWindowsConsumerFeatures
          type: dword
          data: "{{ vars.disable_windows_setup_prompt }}"
        - name: DisableCloudOptimizedContent
          type: dword
          data: "{{ vars.disable_windows_setup_prompt }}"

  - name: Configure automatic restart sign-on
    registry:
      path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System'
      values:
        - name: DisableAutomaticRestartSignOn
          type: dword
          data: "{{ vars.disable_app_restore_on_boot }}"
