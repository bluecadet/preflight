name: preflight/debloat
version: "1.2.0"
description: Remove common Windows bloatware and disable telemetry, Copilot, and AI features
author: preflight

tasks:
  - name: Remove Microsoft news and media apps
    remove_appx_packages:
      packages:
        - name: Clipchamp.Clipchamp
          scope: both
        - name: Microsoft.3DBuilder
          scope: both
        - name: Microsoft.549981C3F5F10 # Cortana
          scope: both
        - name: Microsoft.BingFinance
          scope: both
        - name: Microsoft.BingFoodAndDrink
          scope: both
        - name: Microsoft.BingHealthAndFitness
          scope: both
        - name: Microsoft.BingNews
          scope: both
        - name: Microsoft.BingSports
          scope: both
        - name: Microsoft.BingTranslator
          scope: both
        - name: Microsoft.BingTravel
          scope: both
        - name: Microsoft.BingWeather
          scope: both
        - name: Microsoft.Microsoft3DViewer
          scope: both
        - name: Microsoft.NetworkSpeedTest
          scope: both
        - name: Microsoft.News
          scope: both
        - name: Microsoft.Print3D
          scope: both
        - name: Microsoft.WindowsMaps
          scope: both
        - name: Microsoft.WindowsSoundRecorder
          scope: both
        - name: Microsoft.ZuneVideo
          scope: both

