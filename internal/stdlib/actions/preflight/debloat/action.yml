  - name: Uninstall OneDrive desktop client
    powershell:
      check_script: |
        $installRoots = @(
          "$env:LOCALAPPDATA\Microsoft\OneDrive",
          "$env:ProgramFiles\Microsoft OneDrive",
          "${env:ProgramFiles(x86)}\Microsoft OneDrive"
        )
        $installRoots = @($installRoots | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
        foreach ($root in $installRoots) {
          if (Test-Path -LiteralPath $root) {
            return $true
          }
        }

        $uninstallKeys = @(
          'HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\OneDriveSetup.exe',
          'HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\OneDriveSetup.exe',
          'HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\OneDriveSetup.exe'
        )
        foreach ($key in $uninstallKeys) {
          if (Test-Path -LiteralPath $key) {
            return $true
          }
        }

        return $false
      script: |
        $setupCandidates = @(
          "$env:SystemRoot\SysWOW64\OneDriveSetup.exe",
          "$env:SystemRoot\System32\OneDriveSetup.exe",
          "$env:LOCALAPPDATA\Microsoft\OneDrive\OneDriveSetup.exe",
          "$env:ProgramFiles\Microsoft OneDrive\OneDriveSetup.exe",
          "${env:ProgramFiles(x86)}\Microsoft OneDrive\OneDriveSetup.exe"
        )
        $setupCandidates = @($setupCandidates | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })

        Stop-Process -Name OneDrive -Force -ErrorAction SilentlyContinue
        foreach ($setup in $setupCandidates) {
          if (Test-Path -LiteralPath $setup) {
            Write-Output ("uninstalling OneDrive with " + $setup)
            & $setup /uninstall
            break
          }
        }

        foreach ($path in @(
          "$env:LOCALAPPDATA\Microsoft\OneDrive",
          "$env:ProgramData\Microsoft OneDrive",
          "$env:ProgramFiles\Microsoft OneDrive",
          "${env:ProgramFiles(x86)}\Microsoft OneDrive"
        )) {
          if (-not [string]::IsNullOrWhiteSpace($path) -and (Test-Path -LiteralPath $path)) {
            Remove-Item -LiteralPath $path -Recurse -Force -ErrorAction SilentlyContinue
          }
        }

