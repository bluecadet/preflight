  - name: Disable telemetry
    registry:
      path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\DataCollection'
      values:
        - name: AllowTelemetry
          data: 0

  - name: Disable activity history
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\System'
      values:
        - name: PublishUserActivities
          data: 0

  - name: Disable advertising ID
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\AdvertisingInfo'
      user: "{{ vars.user }}"
      values:
        - name: Enabled
          data: 0

  - name: Disable tailored experiences
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Privacy'
      user: "{{ vars.user }}"
      values:
        - name: TailoredExperiencesWithDiagnosticDataEnabled
          data: 0

  - name: Disable feedback prompts
    registry:
      path: 'HKCU:\SOFTWARE\Microsoft\Siuf\Rules'
      user: "{{ vars.user }}"
      values:
        - name: NumberOfSIUFInPeriod
          data: 0

  - name: Disable Copilot (user policy)
    registry:
      path: 'HKCU:\Software\Policies\Microsoft\Windows\WindowsCopilot'
      user: "{{ vars.user }}"
      values:
        - name: TurnOffWindowsCopilot
          data: 1

  - name: Disable Copilot (system policy)
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsCopilot'
      values:
        - name: TurnOffWindowsCopilot
          data: 1

  - name: Disable AI Recall
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsAI'
      values:
        - name: DisableAIDataAnalysis
          data: 1

  - name: Disable Bing and Cortana in search
    registry:
      path: 'HKCU:\Software\Policies\Microsoft\Windows\Explorer'
      user: "{{ vars.user }}"
      values:
        - name: DisableSearchBoxSuggestions
          data: 1

  - name: Disable Cortana (system policy)
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Windows Search'
      values:
        - name: AllowCortana
          data: 0
        - name: CortanaConsent
          data: 0

  - name: Disable Copilot and Chat taskbar buttons
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
      user: "{{ vars.user }}"
      values:
        - name: ShowCopilotButton
          data: 0
        - name: TaskbarMn
          data: 0
        - name: Start_TrackProgs
          data: 0

  - name: Disable delivery optimization
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\DeliveryOptimization'
      values:
        - name: DODownloadMode
          data: 0

  - name: Disable Game DVR
    registry:
      path: 'HKCU:\System\GameConfigStore'
      user: "{{ vars.user }}"
      values:
        - name: GameDVR_Enabled
          data: 0
