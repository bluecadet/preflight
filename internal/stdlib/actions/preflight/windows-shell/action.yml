name: preflight/windows-shell
version: "4.2.0"
description: Configure Windows shell defaults for kiosk-style machines
author: preflight

inputs:
  user:
    type: string
    default: ""
    description: Optional Windows user to configure without switching process identity
  clear_desktop_background:
    type: bool
    default: true
    description: Clear the desktop wallpaper for the selected user
  clear_desktop_shortcuts:
    type: bool
    default: true
    description: Remove .lnk and .url shortcuts from the selected user's desktop
  taskbar_auto_hide:
    type: bool
    default: false
    description: Enable or disable taskbar auto-hide for the selected user
  theme_mode:
    type: string
    default: unchanged
    description: Keep the current theme or set both app and system surfaces to light or dark
  transparency_effects:
    type: bool
    default: true
    description: Enable or disable transparency effects for the selected user
  hide_recycle_bin:
    type: bool
    default: true
    description: Hide the Recycle Bin icon for the selected user
  show_hidden_files:
    type: bool
    default: true
    description: Show hidden files in File Explorer for the selected user
  show_file_extensions:
    type: bool
    default: true
    description: Show file extensions in File Explorer for the selected user
  show_empty_drives:
    type: bool
    default: true
    description: Show empty removable drives in File Explorer for the selected user
  show_sync_provider_notifications:
    type: bool
    default: false
    description: Show sync provider notifications in File Explorer for the selected user
  aero_shake:
    type: bool
    default: false
    description: Enable or disable Aero Shake window minimization for the selected user
  launch_to_this_pc:
    type: bool
    default: true
    description: Open File Explorer to This PC instead of Quick Access for the selected user
  show_item_check_boxes:
    type: bool
    default: false
    description: Show item check boxes in File Explorer for the selected user
  taskbar_allow_resize:
    type: bool
    default: true
    description: Allow taskbar resizing for the selected user
  taskbar_on_all_displays:
    type: bool
    default: false
    description: Show the taskbar on all displays for the selected user
  taskbar_allow_multimon:
    type: bool
    default: true
    description: Allow multi-monitor taskbar behavior for the selected user
  hide_this_pc_folders:
    type: bool
    default: true
    description: Hide common library folders from This PC
  disable_network_folder_thumbnails:
    type: bool
    default: true
    description: Stop Explorer from creating thumbnail caches on network folders for the selected user
  show_store_apps_on_taskbar:
    type: bool
    default: false
    description: Show Microsoft Store apps on the taskbar for the selected user
  hide_spotlight_desktop_icon:
    type: bool
    default: true
    description: Hide the Windows Spotlight "Learn about this picture" desktop icon for the selected user
  clear_start_pins:
    type: bool
    default: false
    description: Replace the selected user's Start pins with an empty pinned list
  start_pins_json:
    type: string
    default: '{"pinnedList":[]}'
    description: ConfigureStartPins JSON payload used when clearing Start pins

tasks:
  - name: Clear desktop background
    when: "{{ vars.clear_desktop_background }}"
    registry:
      path: 'HKCU:\Control Panel\Desktop'
      user: "{{ vars.user }}"
      values:
        Wallpaper: ""
        WallpaperStyle: "0"
        TileWallpaper: "0"
      ensure: present

  - name: Set desktop background color
    when: "{{ vars.clear_desktop_background }}"
    registry:
      path: 'HKCU:\Control Panel\Colors'
      user: "{{ vars.user }}"
      values:
        Background: "0 0 0"
      ensure: present

  - name: Configure theme mode
    when: "{{ vars.theme_mode != 'unchanged' }}"
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize'
      user: "{{ vars.user }}"
      values:
        - name: AppsUseLightTheme
          type: dword
          data: "{{ vars.theme_mode == 'light' }}"
        - name: SystemUsesLightTheme
          type: dword
          data: "{{ vars.theme_mode == 'light' }}"

  - name: Configure transparency effects
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize'
      user: "{{ vars.user }}"
      values:
        - name: EnableTransparency
          type: dword
          data: "{{ vars.transparency_effects }}"

  - name: Configure hidden files visibility
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
      user: "{{ vars.user }}"
      values:
        - name: Hidden
          type: dword
          data: "{{ vars.show_hidden_files ? 1 : 2 }}"

  - name: Configure file extensions visibility
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
      user: "{{ vars.user }}"
      values:
        - name: HideFileExt
          type: dword
          data: "{{ vars.show_file_extensions == 'false' }}"

  - name: Configure Explorer advanced preferences
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
      user: "{{ vars.user }}"
      values:
        - name: HideDrivesWithNoMedia
          type: dword
          data: "{{ vars.show_empty_drives ? 0 : 1 }}"
        - name: ShowSyncProviderNotifications
          type: dword
          data: "{{ vars.show_sync_provider_notifications ? 1 : 0 }}"
        - name: DisallowShaking
          type: dword
          data: "{{ vars.aero_shake ? 0 : 1 }}"
        - name: LaunchTo
          type: dword
          data: "{{ vars.launch_to_this_pc ? 1 : 2 }}"
        - name: AutoCheckSelect
          type: dword
          data: "{{ vars.show_item_check_boxes ? 1 : 0 }}"
        - name: TaskbarSizeMove
          type: dword
          data: "{{ vars.taskbar_allow_resize ? 1 : 0 }}"
        - name: MMTaskbarEnabled
          type: dword
          data: "{{ vars.taskbar_on_all_displays ? 1 : 0 }}"
        - name: StoreAppsOnTaskbar
          type: dword
          data: "{{ vars.show_store_apps_on_taskbar ? 1 : 0 }}"

  - name: Configure Explorer network thumbnail policy
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer'
      user: "{{ vars.user }}"
      values:
        - name: DisableThumbnailsOnNetworkFolders
          type: dword
          data: "{{ vars.disable_network_folder_thumbnails ? 1 : 0 }}"

  - name: Configure multi-monitor taskbar policy
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer'
      user: "{{ vars.user }}"
      values:
        - name: TaskbarNoMultimon
          type: dword
          data: "{{ vars.taskbar_allow_multimon ? 0 : 1 }}"

  - name: Configure Recycle Bin desktop icon visibility (NewStartPanel)
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\NewStartPanel'
      user: "{{ vars.user }}"
      values:
        - name: '{645FF040-5081-101B-9F08-00AA002F954E}'
          type: dword
          data: "{{ vars.hide_recycle_bin }}"

  - name: Configure Recycle Bin desktop icon visibility (ClassicStartMenu)
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\ClassicStartMenu'
      user: "{{ vars.user }}"
      values:
        - name: '{645FF040-5081-101B-9F08-00AA002F954E}'
          type: dword
          data: "{{ vars.hide_recycle_bin }}"

  - name: Configure common desktop icon visibility (NewStartPanel)
    when: "{{ vars.clear_desktop_shortcuts }}"
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\NewStartPanel'
      user: "{{ vars.user }}"
      values:
        - name: '{20D04FE0-3AEA-1069-A2D8-08002B30309D}'
          type: dword
          data: true
        - name: '{F02C1A0D-BE21-4350-88B0-7367FC96EF3C}'
          type: dword
          data: true
        - name: '{5399E694-6CE5-4D6C-8FCE-1D8870FDCBA0}'
          type: dword
          data: true

  - name: Configure common desktop icon visibility (ClassicStartMenu)
    when: "{{ vars.clear_desktop_shortcuts }}"
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\ClassicStartMenu'
      user: "{{ vars.user }}"
      values:
        - name: '{20D04FE0-3AEA-1069-A2D8-08002B30309D}'
          type: dword
          data: true
        - name: '{F02C1A0D-BE21-4350-88B0-7367FC96EF3C}'
          type: dword
          data: true
        - name: '{5399E694-6CE5-4D6C-8FCE-1D8870FDCBA0}'
          type: dword
          data: true

  - name: Configure taskbar auto-hide
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects3'
      user: "{{ vars.user }}"
      values:
        - name: Settings
          type: binary
          patch:
            - offset: 8
              data: "{{ vars.taskbar_auto_hide ? 3 : 2 }}"

  - name: Hide Music folder from This PC
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{1CF1260C-4DD0-4ebb-811F-33C572699FDE}'
      ensure: absent

  - name: Hide Music folder from This PC (32-bit view)
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Wow6432Node\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{1CF1260C-4DD0-4ebb-811F-33C572699FDE}'
      ensure: absent

  - name: Hide Music library from This PC
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{3dfdf296-dbec-4fb4-81d1-6a3438bcf4de}'
      ensure: absent

  - name: Hide Music library from This PC (32-bit view)
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Wow6432Node\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{3dfdf296-dbec-4fb4-81d1-6a3438bcf4de}'
      ensure: absent

  - name: Hide Pictures folder from This PC
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{3ADD1653-EB32-4cb0-BBD7-DFA0ABB5ACCA}'
      ensure: absent

  - name: Hide Pictures folder from This PC (32-bit view)
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Wow6432Node\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{3ADD1653-EB32-4cb0-BBD7-DFA0ABB5ACCA}'
      ensure: absent

  - name: Hide Pictures library from This PC
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{24ad3ad4-a569-4530-98e1-ab02f9417aa8}'
      ensure: absent

  - name: Hide Pictures library from This PC (32-bit view)
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Wow6432Node\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{24ad3ad4-a569-4530-98e1-ab02f9417aa8}'
      ensure: absent

  - name: Hide Videos folder from This PC
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{A0953C92-50DC-43bf-BE83-3742FED03C9C}'
      ensure: absent

  - name: Hide Videos folder from This PC (32-bit view)
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Wow6432Node\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{A0953C92-50DC-43bf-BE83-3742FED03C9C}'
      ensure: absent

  - name: Hide Videos library from This PC
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{f86fa3ab-70d2-4fc7-9c99-fcbf05467f3a}'
      ensure: absent

  - name: Hide Videos library from This PC (32-bit view)
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Wow6432Node\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{f86fa3ab-70d2-4fc7-9c99-fcbf05467f3a}'
      ensure: absent

  - name: Hide 3D Objects folder from This PC
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{0DB7E03F-FC29-4DC6-9020-FF41B59E513A}'
      ensure: absent

  - name: Hide 3D Objects folder from This PC (32-bit view)
    when: "{{ vars.hide_this_pc_folders }}"
    registry:
      path: 'HKLM:\SOFTWARE\Wow6432Node\Microsoft\Windows\CurrentVersion\Explorer\MyComputer\NameSpace\{0DB7E03F-FC29-4DC6-9020-FF41B59E513A}'
      ensure: absent

  - name: Configure Windows Spotlight desktop icon visibility (NewStartPanel)
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\NewStartPanel'
      user: "{{ vars.user }}"
      values:
        - name: '{2cc5ca98-6485-489a-920e-b3e88a6ccce3}'
          type: dword
          data: "{{ vars.hide_spotlight_desktop_icon }}"

  - name: Configure Windows Spotlight desktop icon visibility (ClassicStartMenu)
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\ClassicStartMenu'
      user: "{{ vars.user }}"
      values:
        - name: '{2cc5ca98-6485-489a-920e-b3e88a6ccce3}'
          type: dword
          data: "{{ vars.hide_spotlight_desktop_icon }}"

  - name: Clear desktop shortcuts
    when: "{{ vars.clear_desktop_shortcuts }}"
    powershell:
      env:
        PREFLIGHT_USER: "{{ vars.user }}"
      check_script: |
        $targetUser = [string]$env:PREFLIGHT_USER

        function Resolve-ProfileSid([string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $null
          }
          $account = New-Object System.Security.Principal.NTAccount($user)
          return $account.Translate([System.Security.Principal.SecurityIdentifier]).Value
        }

        function Resolve-ProfileDirectory([string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $env:USERPROFILE
          }
          $sid = Resolve-ProfileSid $user
          $profileKey = Join-Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\ProfileList' $sid
          $profilePath = (Get-ItemProperty -LiteralPath $profileKey -Name ProfileImagePath -ErrorAction SilentlyContinue).ProfileImagePath
          if ([string]::IsNullOrWhiteSpace($profilePath)) {
            throw ("windows-shell: profile directory was not found for user " + $user)
          }
          return [System.Environment]::ExpandEnvironmentVariables([string]$profilePath)
        }

        function Resolve-UserRegistryPath([string]$path, [string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $path
          }
          $sid = Resolve-ProfileSid $user
          $root = 'Registry::HKEY_USERS\' + $sid
          if (-not (Test-Path -LiteralPath $root)) {
            throw ("windows-shell: profile hive is not loaded for user " + $user + "; sign in as that user or run with become/load_profile before applying user shell settings")
          }
          $subPath = $path -replace '(?i)^HKCU:\\?', ''
          if ($subPath) {
            return (Join-Path $root $subPath)
          }
          return $root
        }

        function Expand-ProfilePath([string]$path, [string]$profileDir) {
          if ([string]::IsNullOrWhiteSpace($path)) {
            return $null
          }
          if (-not [string]::IsNullOrWhiteSpace($profileDir)) {
            $path = $path.Replace('%USERPROFILE%', $profileDir).Replace('%UserProfile%', $profileDir).Replace('%userprofile%', $profileDir)
          }
          return [System.Environment]::ExpandEnvironmentVariables($path)
        }

        function Add-DesktopPath([System.Collections.Generic.List[string]]$paths, [string]$path) {
          if ([string]::IsNullOrWhiteSpace($path)) {
            return
          }
          $resolved = [System.IO.Path]::GetFullPath($path)
          if ((Test-Path -LiteralPath $resolved) -and -not $paths.Contains($resolved)) {
            $paths.Add($resolved)
          }
        }

        function Get-RegistryString([string]$path, [string]$name) {
          $prop = Get-ItemProperty -LiteralPath $path -Name $name -ErrorAction SilentlyContinue
          if ($null -eq $prop) {
            return $null
          }
          return [string]$prop.$name
        }

        function Get-DesktopShortcutPaths([string]$user) {
          $paths = New-Object System.Collections.Generic.List[string]
          $profileDir = Resolve-ProfileDirectory $user
          foreach ($key in @(
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\User Shell Folders',
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Shell Folders'
          )) {
            $resolvedKey = $null
            try {
              $resolvedKey = Resolve-UserRegistryPath $key $user
            } catch {
              $resolvedKey = $null
            }
            if ([string]::IsNullOrWhiteSpace($resolvedKey)) {
              continue
            }
            foreach ($name in @('Desktop', '{754AC886-DF64-4CBA-86B5-F7FBF4FBCEF5}')) {
              Add-DesktopPath $paths (Expand-ProfilePath (Get-RegistryString $resolvedKey $name) $profileDir)
            }
          }
          Add-DesktopPath $paths (Join-Path $profileDir 'Desktop')

          Get-ChildItem -LiteralPath $profileDir -Directory -Filter 'OneDrive*' -ErrorAction SilentlyContinue | ForEach-Object {
            Add-DesktopPath $paths (Join-Path $_.FullName 'Desktop')
          }

          Add-DesktopPath $paths (Get-RegistryString 'HKLM:\Software\Microsoft\Windows\CurrentVersion\Explorer\Shell Folders' 'Common Desktop')
          Add-DesktopPath $paths (Join-Path $env:PUBLIC 'Desktop')
          return $paths.ToArray()
        }

        foreach ($path in (Get-DesktopShortcutPaths $targetUser)) {
          $items = @(Get-ChildItem -LiteralPath $path -File -ErrorAction SilentlyContinue | Where-Object { $_.Extension -in '.lnk', '.url', '.website' })
          if ($items.Count -gt 0) {
            return $true
          }
        }
        return $false
      script: |
        $targetUser = [string]$env:PREFLIGHT_USER

        function Resolve-ProfileSid([string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $null
          }
          $account = New-Object System.Security.Principal.NTAccount($user)
          return $account.Translate([System.Security.Principal.SecurityIdentifier]).Value
        }

        function Resolve-ProfileDirectory([string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $env:USERPROFILE
          }
          $sid = Resolve-ProfileSid $user
          $profileKey = Join-Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\ProfileList' $sid
          $profilePath = (Get-ItemProperty -LiteralPath $profileKey -Name ProfileImagePath -ErrorAction SilentlyContinue).ProfileImagePath
          if ([string]::IsNullOrWhiteSpace($profilePath)) {
            throw ("windows-shell: profile directory was not found for user " + $user)
          }
          return [System.Environment]::ExpandEnvironmentVariables([string]$profilePath)
        }

        function Resolve-UserRegistryPath([string]$path, [string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $path
          }
          $sid = Resolve-ProfileSid $user
          $root = 'Registry::HKEY_USERS\' + $sid
          if (-not (Test-Path -LiteralPath $root)) {
            throw ("windows-shell: profile hive is not loaded for user " + $user + "; sign in as that user or run with become/load_profile before applying user shell settings")
          }
          $subPath = $path -replace '(?i)^HKCU:\\?', ''
          if ($subPath) {
            return (Join-Path $root $subPath)
          }
          return $root
        }

        function Expand-ProfilePath([string]$path, [string]$profileDir) {
          if ([string]::IsNullOrWhiteSpace($path)) {
            return $null
          }
          if (-not [string]::IsNullOrWhiteSpace($profileDir)) {
            $path = $path.Replace('%USERPROFILE%', $profileDir).Replace('%UserProfile%', $profileDir).Replace('%userprofile%', $profileDir)
          }
          return [System.Environment]::ExpandEnvironmentVariables($path)
        }

        function Add-DesktopPath([System.Collections.Generic.List[string]]$paths, [string]$path) {
          if ([string]::IsNullOrWhiteSpace($path)) {
            return
          }
          $resolved = [System.IO.Path]::GetFullPath($path)
          if ((Test-Path -LiteralPath $resolved) -and -not $paths.Contains($resolved)) {
            $paths.Add($resolved)
          }
        }

        function Get-RegistryString([string]$path, [string]$name) {
          $prop = Get-ItemProperty -LiteralPath $path -Name $name -ErrorAction SilentlyContinue
          if ($null -eq $prop) {
            return $null
          }
          return [string]$prop.$name
        }

        function Get-DesktopShortcutPaths([string]$user) {
          $paths = New-Object System.Collections.Generic.List[string]
          $profileDir = Resolve-ProfileDirectory $user
          foreach ($key in @(
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\User Shell Folders',
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Shell Folders'
          )) {
            $resolvedKey = $null
            try {
              $resolvedKey = Resolve-UserRegistryPath $key $user
            } catch {
              $resolvedKey = $null
            }
            if ([string]::IsNullOrWhiteSpace($resolvedKey)) {
              continue
            }
            foreach ($name in @('Desktop', '{754AC886-DF64-4CBA-86B5-F7FBF4FBCEF5}')) {
              Add-DesktopPath $paths (Expand-ProfilePath (Get-RegistryString $resolvedKey $name) $profileDir)
            }
          }
          Add-DesktopPath $paths (Join-Path $profileDir 'Desktop')

          Get-ChildItem -LiteralPath $profileDir -Directory -Filter 'OneDrive*' -ErrorAction SilentlyContinue | ForEach-Object {
            Add-DesktopPath $paths (Join-Path $_.FullName 'Desktop')
          }

          Add-DesktopPath $paths (Get-RegistryString 'HKLM:\Software\Microsoft\Windows\CurrentVersion\Explorer\Shell Folders' 'Common Desktop')
          Add-DesktopPath $paths (Join-Path $env:PUBLIC 'Desktop')
          return $paths.ToArray()
        }

        foreach ($path in (Get-DesktopShortcutPaths $targetUser)) {
          Write-Output ("Removing desktop shortcuts from " + $path)
          Get-ChildItem -LiteralPath $path -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Extension -in '.lnk', '.url', '.website' } |
            Remove-Item -Force -ErrorAction SilentlyContinue
        }

  - name: Clear Start pins
    when: "{{ vars.clear_start_pins }}"
    registry:
      path: 'HKCU:\SOFTWARE\Policies\Microsoft\Windows\Explorer'
      user: "{{ vars.user }}"
      values:
        ConfigureStartPins: "{{ vars.start_pins_json }}"
