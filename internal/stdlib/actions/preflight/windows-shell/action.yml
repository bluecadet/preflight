name: preflight/windows-shell
version: "3.3.0"
description: Configure Windows shell defaults for kiosk-style machines
author: preflight

inputs:
  profile_user:
    type: string
    default: ""
    description: Optional Windows user profile to configure without switching process identity
  clear_desktop_background:
    type: bool
    default: true
    description: Clear the desktop wallpaper for the selected user profile
  clear_desktop_shortcuts:
    type: bool
    default: true
    description: Remove .lnk and .url shortcuts from the selected user profile's desktop
  taskbar_auto_hide:
    type: bool
    default: false
    description: Enable or disable taskbar auto-hide for the selected user profile
  theme_mode:
    type: string
    default: unchanged
    description: Keep the current theme or set both app and system surfaces to light or dark
  transparency_effects:
    type: bool
    default: true
    description: Enable or disable transparency effects for the selected user profile
  hide_recycle_bin:
    type: bool
    default: true
    description: Hide the Recycle Bin icon for the selected user profile
  show_hidden_files:
    type: bool
    default: true
    description: Show hidden files in File Explorer for the selected user profile
  show_file_extensions:
    type: bool
    default: true
    description: Show file extensions in File Explorer for the selected user profile
  clear_start_pins:
    type: bool
    default: false
    description: Replace the selected user profile's Start pins with an empty pinned list

tasks:
  - name: Clear desktop background
    when: "{{ vars.clear_desktop_background }}"
    registry:
      path: 'HKCU:\Control Panel\Desktop'
      user: "{{ vars.profile_user }}"
      values:
        Wallpaper: ""
        WallpaperStyle: "0"
        TileWallpaper: "0"
      ensure: present

  - name: Configure theme mode
    when: "{{ vars.theme_mode != 'unchanged' }}"
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize'
      user: "{{ vars.profile_user }}"
      values:
        - name: AppsUseLightTheme
          type: dword
          data: "{{ vars.theme_mode == 'light' }}"
        - name: SystemUsesLightTheme
          type: dword
          data: "{{ vars.theme_mode == 'light' }}"

  - name: Configure transparency effects
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize'
      user: "{{ vars.profile_user }}"
      values:
        - name: EnableTransparency
          type: dword
          data: "{{ vars.transparency_effects }}"

  - name: Configure hidden files visibility
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
      user: "{{ vars.profile_user }}"
      values:
        - name: Hidden
          type: dword
          data: "{{ vars.show_hidden_files ? 1 : 2 }}"

  - name: Configure file extensions visibility
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
      user: "{{ vars.profile_user }}"
      values:
        - name: HideFileExt
          type: dword
          data: "{{ vars.show_file_extensions == 'false' }}"

  - name: Configure Recycle Bin desktop icon visibility (NewStartPanel)
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\NewStartPanel'
      user: "{{ vars.profile_user }}"
      values:
        - name: '{645FF040-5081-101B-9F08-00AA002F954E}'
          type: dword
          data: "{{ vars.hide_recycle_bin }}"

  - name: Configure Recycle Bin desktop icon visibility (ClassicStartMenu)
    registry:
      path: 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\ClassicStartMenu'
      user: "{{ vars.profile_user }}"
      values:
        - name: '{645FF040-5081-101B-9F08-00AA002F954E}'
          type: dword
          data: "{{ vars.hide_recycle_bin }}"

  - name: Configure taskbar auto-hide
    powershell:
      env:
        PREFLIGHT_PROFILE_USER: "{{ vars.profile_user }}"
        PREFLIGHT_TASKBAR_AUTO_HIDE: "{{ vars.taskbar_auto_hide }}"
      check_script: |
        $profileUser = [string]$env:PREFLIGHT_PROFILE_USER
        $desiredStateByte = if ([System.Convert]::ToBoolean($env:PREFLIGHT_TASKBAR_AUTO_HIDE)) { 3 } else { 2 }

        function Resolve-ProfileSid([string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $null
          }
          $account = New-Object System.Security.Principal.NTAccount($user)
          return $account.Translate([System.Security.Principal.SecurityIdentifier]).Value
        }

        function Resolve-UserRegistryPath([string]$path, [string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $path
          }
          if (-not ($path -match '(?i)^(HKCU:|HKEY_CURRENT_USER\\)')) {
            throw 'windows-shell: profile_user can only be used with HKCU/HKEY_CURRENT_USER paths'
          }
          $sid = Resolve-ProfileSid $user
          $root = 'Registry::HKEY_USERS\' + $sid
          if (-not (Test-Path -LiteralPath $root)) {
            throw ("windows-shell: profile hive is not loaded for user " + $user + "; sign in as that user or run with become/load_profile before applying profile_user shell settings")
          }
          $subPath = $path -replace '(?i)^(HKCU:\\?|HKEY_CURRENT_USER\\?)', ''
          if ($subPath) {
            return (Join-Path $root $subPath)
          }
          return $root
        }

        function Get-TaskbarSettingsPath([string]$user) {
          foreach ($candidate in @(
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects3',
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects2'
          )) {
            $resolved = Resolve-UserRegistryPath $candidate $user
            if (Test-Path -LiteralPath $resolved) {
              return $resolved
            }
          }
          return (Resolve-UserRegistryPath 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects3' $user)
        }

        $path = Get-TaskbarSettingsPath $profileUser
        $settings = (Get-ItemProperty -LiteralPath $path -Name Settings -ErrorAction SilentlyContinue).Settings
        if ($null -eq $settings -or $settings.Length -lt 9) {
          return $true
        }

        return ([int]$settings[8] -ne $desiredStateByte)
      script: |
        $profileUser = [string]$env:PREFLIGHT_PROFILE_USER
        $enabled = [System.Convert]::ToBoolean($env:PREFLIGHT_TASKBAR_AUTO_HIDE)
        $desiredStateByte = if ($enabled) { 3 } else { 2 }

        function Resolve-ProfileSid([string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $null
          }
          $account = New-Object System.Security.Principal.NTAccount($user)
          return $account.Translate([System.Security.Principal.SecurityIdentifier]).Value
        }

        function Resolve-UserRegistryPath([string]$path, [string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $path
          }
          if (-not ($path -match '(?i)^(HKCU:|HKEY_CURRENT_USER\\)')) {
            throw 'windows-shell: profile_user can only be used with HKCU/HKEY_CURRENT_USER paths'
          }
          $sid = Resolve-ProfileSid $user
          $root = 'Registry::HKEY_USERS\' + $sid
          if (-not (Test-Path -LiteralPath $root)) {
            throw ("windows-shell: profile hive is not loaded for user " + $user + "; sign in as that user or run with become/load_profile before applying profile_user shell settings")
          }
          $subPath = $path -replace '(?i)^(HKCU:\\?|HKEY_CURRENT_USER\\?)', ''
          if ($subPath) {
            return (Join-Path $root $subPath)
          }
          return $root
        }

        function Get-TaskbarSettingsPath([string]$user) {
          foreach ($candidate in @(
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects3',
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects2'
          )) {
            $resolved = Resolve-UserRegistryPath $candidate $user
            if (Test-Path -LiteralPath $resolved) {
              return $resolved
            }
          }
          return (Resolve-UserRegistryPath 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects3' $user)
        }

        $path = Get-TaskbarSettingsPath $profileUser
        $settings = (Get-ItemProperty -LiteralPath $path -Name Settings -ErrorAction SilentlyContinue).Settings
        if ($null -eq $settings -or $settings.Length -lt 9) {
          throw ("taskbar_auto_hide requires an existing Explorer Settings value at " + $path)
        }
        $updated = [byte[]]$settings.Clone()
        $updated[8] = [byte]$desiredStateByte
        New-Item -Path $path -Force | Out-Null
        New-ItemProperty -LiteralPath $path -Name Settings -Value $updated -PropertyType Binary -Force | Out-Null
        if ([string]::IsNullOrWhiteSpace($profileUser)) {
          Write-Output ("Persisting taskbar auto-hide for the current user profile: " + $enabled)
        } else {
          Write-Output ("Persisting taskbar auto-hide for profile_user " + $profileUser + ": " + $enabled)
        }
        Write-Output 'Restart Explorer or sign out to see the updated taskbar behavior'

  - name: Clear desktop shortcuts
    when: "{{ vars.clear_desktop_shortcuts }}"
    powershell:
      env:
        PREFLIGHT_PROFILE_USER: "{{ vars.profile_user }}"
      check_script: |
        $profileUser = [string]$env:PREFLIGHT_PROFILE_USER

        function Resolve-ProfileSid([string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $null
          }
          $account = New-Object System.Security.Principal.NTAccount($user)
          return $account.Translate([System.Security.Principal.SecurityIdentifier]).Value
        }

        function Resolve-ProfileDirectory([string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $env:USERPROFILE
          }
          $sid = Resolve-ProfileSid $user
          $profileKey = Join-Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\ProfileList' $sid
          $profilePath = (Get-ItemProperty -LiteralPath $profileKey -Name ProfileImagePath -ErrorAction SilentlyContinue).ProfileImagePath
          if ([string]::IsNullOrWhiteSpace($profilePath)) {
            throw ("windows-shell: profile directory was not found for user " + $user)
          }
          return [System.Environment]::ExpandEnvironmentVariables([string]$profilePath)
        }

        $profileDir = Resolve-ProfileDirectory $profileUser
        $path = Join-Path $profileDir 'Desktop'
        if (-not (Test-Path -LiteralPath $path)) {
          return $false
        }
        $items = @(Get-ChildItem -LiteralPath $path -File -ErrorAction SilentlyContinue | Where-Object { $_.Extension -in '.lnk', '.url' })
        return ($items.Count -gt 0)
      script: |
        $profileUser = [string]$env:PREFLIGHT_PROFILE_USER

        function Resolve-ProfileSid([string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $null
          }
          $account = New-Object System.Security.Principal.NTAccount($user)
          return $account.Translate([System.Security.Principal.SecurityIdentifier]).Value
        }

        function Resolve-ProfileDirectory([string]$user) {
          if ([string]::IsNullOrWhiteSpace($user)) {
            return $env:USERPROFILE
          }
          $sid = Resolve-ProfileSid $user
          $profileKey = Join-Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\ProfileList' $sid
          $profilePath = (Get-ItemProperty -LiteralPath $profileKey -Name ProfileImagePath -ErrorAction SilentlyContinue).ProfileImagePath
          if ([string]::IsNullOrWhiteSpace($profilePath)) {
            throw ("windows-shell: profile directory was not found for user " + $user)
          }
          return [System.Environment]::ExpandEnvironmentVariables([string]$profilePath)
        }

        $profileDir = Resolve-ProfileDirectory $profileUser
        $path = Join-Path $profileDir 'Desktop'
        if (-not (Test-Path -LiteralPath $path)) {
          exit 0
        }
        Write-Output ("Removing desktop shortcuts from " + $path)
        Get-ChildItem -LiteralPath $path -File -ErrorAction SilentlyContinue |
          Where-Object { $_.Extension -in '.lnk', '.url' } |
          Remove-Item -Force -ErrorAction SilentlyContinue

  - name: Clear Start pins
    when: "{{ vars.clear_start_pins }}"
    registry:
      path: 'HKCU:\SOFTWARE\Policies\Microsoft\Windows\Explorer'
      user: "{{ vars.profile_user }}"
      values:
        ConfigureStartPins: '{"pinnedList":[]}'
