name: preflight/windows-shell
version: "2.0.0"
description: Configure Windows shell defaults for kiosk-style machines
author: preflight

inputs:
  clear_desktop_background:
    type: bool
    default: true
    description: Clear the desktop wallpaper for the current user
  clear_desktop_shortcuts:
    type: bool
    default: true
    description: Remove .lnk and .url shortcuts from the current user's desktop
  taskbar_auto_hide:
    type: string
    default: unchanged
    description: Keep the current user's taskbar behavior or set auto-hide enabled or disabled
  theme_mode:
    type: string
    default: unchanged
    description: Keep the current theme or set both app and system surfaces to light or dark
  transparency_effects:
    type: string
    default: unchanged
    description: Keep the current transparency preference or set it to enabled or disabled
  hide_recycle_bin:
    type: bool
    default: true
    description: Hide the Recycle Bin icon for the current user
  show_hidden_files:
    type: bool
    default: true
    description: Show hidden files in File Explorer for the current user
  show_file_extensions:
    type: bool
    default: true
    description: Show file extensions in File Explorer for the current user
  clear_start_pins:
    type: bool
    default: false
    description: Replace the current user's Start pins with an empty pinned list
  start_pins_json:
    type: string
    default: ""
    description: JSON content for the current user's ConfigureStartPins policy value

tasks:
  - name: Clear desktop background
    when: "{{ vars.clear_desktop_background }}"
    registry:
      path: 'HKCU:\Control Panel\Desktop'
      values:
        Wallpaper: ""
        WallpaperStyle: "0"
        TileWallpaper: "0"
      ensure: present

  - name: Configure theme mode
    powershell:
      check_script: |
        $themeMode = ([string]'{{ vars.theme_mode }}').Trim().ToLowerInvariant()
        if ([string]::IsNullOrWhiteSpace($themeMode) -or $themeMode -eq 'unchanged') {
          return $false
        }

        switch ($themeMode) {
          'light' { $desiredLightTheme = 1 }
          'dark' { $desiredLightTheme = 0 }
          default { throw "theme_mode must be one of: unchanged, light, dark" }
        }

        $path = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize'
        $props = Get-ItemProperty -LiteralPath $path -ErrorAction SilentlyContinue
        if ($null -eq $props) {
          return $true
        }
        if ($null -eq $props.AppsUseLightTheme -or [int]$props.AppsUseLightTheme -ne $desiredLightTheme) {
          return $true
        }
        return ($null -eq $props.SystemUsesLightTheme -or [int]$props.SystemUsesLightTheme -ne $desiredLightTheme)
      script: |
        $themeMode = ([string]'{{ vars.theme_mode }}').Trim().ToLowerInvariant()
        if ([string]::IsNullOrWhiteSpace($themeMode) -or $themeMode -eq 'unchanged') {
          exit 0
        }

        switch ($themeMode) {
          'light' { $desiredLightTheme = 1 }
          'dark' { $desiredLightTheme = 0 }
          default { throw "theme_mode must be one of: unchanged, light, dark" }
        }

        $path = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize'
        New-Item -Path $path -Force | Out-Null
        New-ItemProperty -LiteralPath $path -Name AppsUseLightTheme -Value $desiredLightTheme -PropertyType DWord -Force | Out-Null
        New-ItemProperty -LiteralPath $path -Name SystemUsesLightTheme -Value $desiredLightTheme -PropertyType DWord -Force | Out-Null
        Write-Output ("Persisting " + $themeMode + " theme mode for the current user profile")
        Write-Output 'Sign out or restart Explorer to see updated shell visuals'

  - name: Configure transparency effects
    powershell:
      check_script: |
        $transparency = ([string]'{{ vars.transparency_effects }}').Trim().ToLowerInvariant()
        if ([string]::IsNullOrWhiteSpace($transparency) -or $transparency -eq 'unchanged') {
          return $false
        }

        switch ($transparency) {
          'enabled' { $desiredTransparency = 1 }
          'disabled' { $desiredTransparency = 0 }
          default { throw "transparency_effects must be one of: unchanged, enabled, disabled" }
        }

        $path = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize'
        $props = Get-ItemProperty -LiteralPath $path -ErrorAction SilentlyContinue
        return ($null -eq $props -or $null -eq $props.EnableTransparency -or [int]$props.EnableTransparency -ne $desiredTransparency)
      script: |
        $transparency = ([string]'{{ vars.transparency_effects }}').Trim().ToLowerInvariant()
        if ([string]::IsNullOrWhiteSpace($transparency) -or $transparency -eq 'unchanged') {
          exit 0
        }

        switch ($transparency) {
          'enabled' { $desiredTransparency = 1 }
          'disabled' { $desiredTransparency = 0 }
          default { throw "transparency_effects must be one of: unchanged, enabled, disabled" }
        }

        $path = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize'
        New-Item -Path $path -Force | Out-Null
        New-ItemProperty -LiteralPath $path -Name EnableTransparency -Value $desiredTransparency -PropertyType DWord -Force | Out-Null
        Write-Output ("Persisting transparency effects for the current user profile: " + $transparency)
        Write-Output 'Sign out or restart Explorer to see updated shell visuals'

  - name: Configure hidden files visibility
    powershell:
      check_script: |
        $desiredHidden = if ([System.Convert]::ToBoolean('{{ vars.show_hidden_files }}')) { 1 } else { 2 }
        $path = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
        $props = Get-ItemProperty -LiteralPath $path -ErrorAction SilentlyContinue
        return ($null -eq $props -or [int]$props.Hidden -ne $desiredHidden)
      script: |
        $desiredHidden = if ([System.Convert]::ToBoolean('{{ vars.show_hidden_files }}')) { 1 } else { 2 }
        $path = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
        New-Item -Path $path -Force | Out-Null
        New-ItemProperty -LiteralPath $path -Name Hidden -Value $desiredHidden -PropertyType DWord -Force | Out-Null
        Write-Output 'Persisting hidden files visibility for the current user profile'

  - name: Configure file extensions visibility
    powershell:
      check_script: |
        $desiredHideFileExt = if ([System.Convert]::ToBoolean('{{ vars.show_file_extensions }}')) { 0 } else { 1 }
        $path = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
        $props = Get-ItemProperty -LiteralPath $path -ErrorAction SilentlyContinue
        return ($null -eq $props -or [int]$props.HideFileExt -ne $desiredHideFileExt)
      script: |
        $desiredHideFileExt = if ([System.Convert]::ToBoolean('{{ vars.show_file_extensions }}')) { 0 } else { 1 }
        $path = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
        New-Item -Path $path -Force | Out-Null
        New-ItemProperty -LiteralPath $path -Name HideFileExt -Value $desiredHideFileExt -PropertyType DWord -Force | Out-Null
        Write-Output 'Persisting file extensions visibility for the current user profile'

  - name: Configure Recycle Bin desktop icon visibility
    powershell:
      check_script: |
        $desiredRecycleBin = if ([System.Convert]::ToBoolean('{{ vars.hide_recycle_bin }}')) { 1 } else { 0 }
        $recycleBinGuid = '{645FF040-5081-101B-9F08-00AA002F954E}'
        foreach ($path in @(
          'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\NewStartPanel',
          'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\ClassicStartMenu'
        )) {
          $value = (Get-ItemProperty -LiteralPath $path -Name $recycleBinGuid -ErrorAction SilentlyContinue).$recycleBinGuid
          if ($null -eq $value -or [int]$value -ne $desiredRecycleBin) {
            return $true
          }
        }
        return $false
      script: |
        $desiredRecycleBin = if ([System.Convert]::ToBoolean('{{ vars.hide_recycle_bin }}')) { 1 } else { 0 }
        $recycleBinGuid = '{645FF040-5081-101B-9F08-00AA002F954E}'
        foreach ($path in @(
          'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\NewStartPanel',
          'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\HideDesktopIcons\ClassicStartMenu'
        )) {
          New-Item -Path $path -Force | Out-Null
          New-ItemProperty -LiteralPath $path -Name $recycleBinGuid -Value $desiredRecycleBin -PropertyType DWord -Force | Out-Null
        }
        Write-Output 'Persisting Recycle Bin desktop icon visibility for the current user profile'

  - name: Configure taskbar auto-hide
    powershell:
      check_script: |
        $taskbarAutoHide = ([string]'{{ vars.taskbar_auto_hide }}').Trim().ToLowerInvariant()
        if ([string]::IsNullOrWhiteSpace($taskbarAutoHide) -or $taskbarAutoHide -eq 'unchanged') {
          return $false
        }

        switch ($taskbarAutoHide) {
          'enabled' {
            $desiredStateByte = 3
            $desiredAutoHide = $true
          }
          'disabled' {
            $desiredStateByte = 2
            $desiredAutoHide = $false
          }
          default { throw "taskbar_auto_hide must be one of: unchanged, enabled, disabled" }
        }

        function Get-TaskbarSettingsPath() {
          foreach ($candidate in @(
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects3',
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects2'
          )) {
            if (Test-Path -LiteralPath $candidate) {
              return $candidate
            }
          }
          return 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects3'
        }

        $path = Get-TaskbarSettingsPath
        $settings = (Get-ItemProperty -LiteralPath $path -Name Settings -ErrorAction SilentlyContinue).Settings
        if ($null -eq $settings -or $settings.Length -lt 9) {
          return $true
        }

        return ([int]$settings[8] -ne $desiredStateByte)
      script: |
        $taskbarAutoHide = ([string]'{{ vars.taskbar_auto_hide }}').Trim().ToLowerInvariant()
        if ([string]::IsNullOrWhiteSpace($taskbarAutoHide) -or $taskbarAutoHide -eq 'unchanged') {
          exit 0
        }

        switch ($taskbarAutoHide) {
          'enabled' { $desiredStateByte = 3 }
          'disabled' { $desiredStateByte = 2 }
          default { throw "taskbar_auto_hide must be one of: unchanged, enabled, disabled" }
        }

        function Get-TaskbarSettingsPath() {
          foreach ($candidate in @(
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects3',
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects2'
          )) {
            if (Test-Path -LiteralPath $candidate) {
              return $candidate
            }
          }
          return 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects3'
        }

        $path = Get-TaskbarSettingsPath
        $settings = (Get-ItemProperty -LiteralPath $path -Name Settings -ErrorAction SilentlyContinue).Settings
        if ($null -eq $settings -or $settings.Length -lt 9) {
          throw ("taskbar_auto_hide requires an existing Explorer Settings value at " + $path)
        }
        $updated = [byte[]]$settings.Clone()
        $updated[8] = [byte]$desiredStateByte
        New-Item -Path $path -Force | Out-Null
        New-ItemProperty -LiteralPath $path -Name Settings -Value $updated -PropertyType Binary -Force | Out-Null
        Write-Output ("Persisting taskbar auto-hide for the current user profile: " + $taskbarAutoHide)
        Write-Output 'Restart Explorer or sign out to see the updated taskbar behavior'

  - name: Clear desktop shortcuts
    when: "{{ vars.clear_desktop_shortcuts }}"
    powershell:
      check_script: |
        $path = Join-Path $env:USERPROFILE 'Desktop'
        if (-not (Test-Path -LiteralPath $path)) {
          return $false
        }
        $items = Get-ChildItem -LiteralPath $path -File -ErrorAction SilentlyContinue | Where-Object { $_.Extension -in '.lnk', '.url' }
        return [bool]$items
      script: |
        $path = Join-Path $env:USERPROFILE 'Desktop'
        if (-not (Test-Path -LiteralPath $path)) {
          exit 0
        }
        Write-Output ("Removing desktop shortcuts from " + $path)
        Get-ChildItem -LiteralPath $path -File -ErrorAction SilentlyContinue |
          Where-Object { $_.Extension -in '.lnk', '.url' } |
          Remove-Item -Force -ErrorAction SilentlyContinue

  - name: Configure Start pins policy
    powershell:
      check_script: |
        $desiredJson = '{{ vars.start_pins_json }}'
        if ([string]::IsNullOrWhiteSpace($desiredJson) -and [System.Convert]::ToBoolean('{{ vars.clear_start_pins }}')) {
          $desiredJson = '{"pinnedList":[]}'
        }
        if ([string]::IsNullOrWhiteSpace($desiredJson)) {
          return $false
        }
        $path = 'HKCU:\SOFTWARE\Policies\Microsoft\Windows\Explorer'
        $current = (Get-ItemProperty -LiteralPath $path -Name ConfigureStartPins -ErrorAction SilentlyContinue).ConfigureStartPins
        return ([string]$current -ne $desiredJson)
      script: |
        $desiredJson = '{{ vars.start_pins_json }}'
        if ([string]::IsNullOrWhiteSpace($desiredJson) -and [System.Convert]::ToBoolean('{{ vars.clear_start_pins }}')) {
          $desiredJson = '{"pinnedList":[]}'
        }
        if ([string]::IsNullOrWhiteSpace($desiredJson)) {
          exit 0
        }
        $path = 'HKCU:\SOFTWARE\Policies\Microsoft\Windows\Explorer'
        New-Item -Path $path -Force | Out-Null
        New-ItemProperty -LiteralPath $path -Name ConfigureStartPins -Value $desiredJson -PropertyType String -Force | Out-Null
        Write-Output 'Persisting Start pins policy for the current user profile'
