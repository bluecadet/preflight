name: preflight/windows-input
version: "2.3.0"
description: Configure Windows touch, gesture, and text-size input preferences
author: preflight

inputs:
  user:
    type: string
    default: ""
    description: Optional Windows user for user-scoped input preferences
  disable_edge_gestures:
    type: bool
    default: true
    description: Disable screen-edge swipe gestures that invoke Windows UI
  disable_touch_feedback:
    type: bool
    default: true
    description: Disable touch contact visualization feedback for the selected user
  disable_touch_gestures:
    type: bool
    default: true
    description: Disable gesture visualization feedback for the selected user
  text_scale_percent:
    type: int
    default: 100
    description: Windows text size percentage for the selected user
  disable_accessibility_shortcuts:
    type: bool
    default: true
    description: Disable Sticky Keys, Filter Keys, and Toggle Keys shortcuts for the selected user

tasks:
  - name: Configure edge swipe policy
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\EdgeUI'
      values:
        - name: AllowEdgeSwipe
          type: dword
          data: "{{ vars.disable_edge_gestures == 'false' }}"

  - name: Configure touch gestures
    registry:
      path: 'HKCU:\Control Panel\Desktop'
      user: "{{ vars.user }}"
      values:
        - name: TouchGestureSetting
          type: dword
          data: "{{ vars.disable_touch_gestures == 'false' }}"

  # See https://www.tenforums.com/tutorials/98415-turn-off-touch-visual-feedback-windows-10-a.html
  - name: Configure touch visual feedback
    registry:
      path: 'HKCU:\Control Panel\Cursors'
      user: "{{ vars.user }}"
      values:
        - name: ContactVisualization
          type: dword
          data: "{{ vars.disable_touch_feedback == 'false' }}"
        - name: GestureVisualization
          type: dword
          data: "{{ vars.disable_touch_feedback == 'false' }}"

  # See https://www.top-password.com/blog/turn-on-off-press-and-hold-for-right-clicking-in-windows-10/
  - name: Configure press and hold for right-clicking
    registry:
      path: 'HKCU:\Software\Microsoft\Wisp\Touch'
      user: "{{ vars.user }}"
      values:
        - name: TouchMode_hold
          type: dword
          data: "{{ vars.disable_touch_gestures == 'false' }}"

  - name: Configure press and hold for right-clicking on pen input
    registry:
      path: 'HKCU:\Software\Microsoft\Wisp\Pen\SysEventParameters'
      user: "{{ vars.user }}"
      values:
        - name: HoldMode
          type: dword
          data: "{{ vars.disable_touch_gestures ? 3 : 1 }}"

  # See https://getadmx.com/?Category=Windows_10_2016&Policy=Microsoft.Policies.TabletPCInputPanel::EdgeTarget_2
  - name: Configure touch gesture edge targeting
    registry:
      path: 'HKLM:\software\policies\microsoft\TabletTip\1.7'
      values:
        - name: DisableEdgeTarget
          type: dword
          data: "{{ vars.disable_touch_gestures == 'false' }}"

  - name: Configure Sticky Keys shortcut behavior
    registry:
      path: 'HKCU:\Control Panel\Accessibility\StickyKeys'
      user: "{{ vars.user }}"
      values:
        - name: Flags
          type: string
          data: "{{ vars.disable_accessibility_shortcuts ? '506' : '510' }}"

  - name: Configure Filter Keys shortcut behavior
    registry:
      path: 'HKCU:\Control Panel\Accessibility\Keyboard Response'
      user: "{{ vars.user }}"
      values:
        - name: Flags
          type: string
          data: "{{ vars.disable_accessibility_shortcuts ? '122' : '126' }}"

  - name: Configure Toggle Keys shortcut behavior
    registry:
      path: 'HKCU:\Control Panel\Accessibility\ToggleKeys'
      user: "{{ vars.user }}"
      values:
        - name: Flags
          type: string
          data: "{{ vars.disable_accessibility_shortcuts ? '58' : '62' }}"

  - name: Configure text scale
    registry:
      path: 'HKCU:\Software\Microsoft\Accessibility'
      user: "{{ vars.user }}"
      values:
        - name: TextScaleFactor
          type: dword
          data: "{{ vars.text_scale_percent }}"
