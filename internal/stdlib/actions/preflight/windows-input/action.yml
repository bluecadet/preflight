name: preflight/windows-input
version: "2.1.0"
description: Configure Windows touch, gesture, and text-size input preferences
author: preflight

inputs:
  disable_edge_gestures:
    type: bool
    default: true
    description: Disable screen-edge swipe gestures that invoke Windows UI
  disable_touch_feedback:
    type: bool
    default: true
    description: Disable touch contact visualization feedback for the current user
  disable_touch_gestures:
    type: bool
    default: true
    description: Disable gesture visualization feedback for the current user
  text_scale_percent:
    type: int
    default: 100
    description: Windows text size percentage for the current user

tasks:
  - name: Configure edge swipe policy
    registry:
      path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\EdgeUI'
      values:
        - name: AllowEdgeSwipe
          type: dword
          data: "{{ vars.disable_edge_gestures == 'false' }}"

  - name: Configure text scale
    registry:
      path: 'HKCU:\Software\Microsoft\Accessibility'
      values:
        - name: TextScaleFactor
          type: dword
          data: "{{ vars.text_scale_percent }}"

  - name: Configure touch feedback visualization
    powershell:
      check_script: |
        $desiredContact = [uint32]1
        if ([System.Convert]::ToBoolean('{{ vars.disable_touch_feedback }}')) {
          $desiredContact = [uint32]0
        }
        $desiredGesture = [uint32]31
        if ([System.Convert]::ToBoolean('{{ vars.disable_touch_gestures }}')) {
          $desiredGesture = [uint32]0
        }

        $path = 'HKCU:\Control Panel\Cursors'
        $prop = Get-ItemProperty -LiteralPath $path -Name ContactVisualization,GestureVisualization -ErrorAction SilentlyContinue
        if ($null -eq $prop) {
          return $true
        }
        return ([uint32]$prop.ContactVisualization -ne $desiredContact -or [uint32]$prop.GestureVisualization -ne $desiredGesture)
      script: |
        $desiredContact = [uint32]1
        if ([System.Convert]::ToBoolean('{{ vars.disable_touch_feedback }}')) {
          $desiredContact = [uint32]0
        }
        $desiredGesture = [uint32]31
        if ([System.Convert]::ToBoolean('{{ vars.disable_touch_gestures }}')) {
          $desiredGesture = [uint32]0
        }

        $path = 'HKCU:\Control Panel\Cursors'
        New-Item -Path $path -Force | Out-Null
        New-ItemProperty -LiteralPath $path -Name ContactVisualization -Value $desiredContact -PropertyType DWord -Force | Out-Null
        New-ItemProperty -LiteralPath $path -Name GestureVisualization -Value $desiredGesture -PropertyType DWord -Force | Out-Null

        Add-Type @"
        using System;
        using System.Runtime.InteropServices;
        public static class NativeMethods {
          [DllImport("user32.dll", SetLastError=true)]
          public static extern bool SystemParametersInfo(uint uiAction, uint uiParam, ref uint pvParam, uint fWinIni);
        }
        "@

        Write-Output 'Applying touch feedback and gesture visibility settings for the current user'
        [void][NativeMethods]::SystemParametersInfo(0x2019, 0, [ref]$desiredContact, 3)
        [void][NativeMethods]::SystemParametersInfo(0x201B, 0, [ref]$desiredGesture, 3)
