name: preflight/autologin
version: "1.0.0"
description: Configure Windows automatic login
author: preflight

inputs:
  username:
    type: string
    required: true
    description: Username to auto-login as
  password:
    type: string
    required: false
    description: Password for the auto-login user
  domain:
    type: string
    default: "."
    description: Domain name (use . for local accounts)

tasks:
  - name: Enable auto-login
    registry:
      path: 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon'
      values:
        - name: AutoAdminLogon
          data: "1"
        - name: DefaultUserName
          data: "{{ vars.username }}"
        - name: DefaultPassword
          data: "{{ vars.password }}"
        - name: DefaultDomainName
          data: "{{ vars.domain }}"
      ensure: present
