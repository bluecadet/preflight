name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      build: ${{ steps.filter.outputs.build }}
      winrm: ${{ steps.filter.outputs.winrm }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            go:
              - '**/*.go'
              - go.mod
              - go.sum
              - .golangci.yml
              - .golangci.yaml
              - .golangci.toml
              - .golangci.json
              - Makefile
              - .github/workflows/ci.yml
            winrm:
              - 'scripts/bootstrap-winrm-vm.ps1'
              - 'install.ps1'
              - '**/target/winrm*'
              - '**/target/persistent_ps*'
              - .github/workflows/ci.yml
            build:
              - '**/*.go'
              - go.mod
              - go.sum
              - Makefile
              - install.sh
              - install.ps1
              - .goreleaser.yaml
              - .github/workflows/ci.yml
              - .github/workflows/release.yml

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./...

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  integration-windows:
    name: Integration (Windows)
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.winrm == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate test credential
        shell: powershell
        run: |
          $pass = -join ([char[]](33..126) | Get-Random -Count 24)
          "PREFLIGHT_TEST_WINRM_PASS=$pass" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Provision loopback WinRM via bootstrap script
        shell: powershell
        run: ./scripts/bootstrap-winrm-vm.ps1

      - name: Configure PREFLIGHT_TEST_WINRM for loopback
        shell: powershell
        run: |
          $json = @{host="127.0.0.1";port=5985;user="pf-test";pass="$env:PREFLIGHT_TEST_WINRM_PASS"} | ConvertTo-Json -Compress
          "PREFLIGHT_TEST_WINRM=$json" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run WinRM integration suite
        shell: powershell
        run: go test -v -count=1 -run TestWinRMIntegration ./internal/target/

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            output: preflight-windows-amd64.exe
          - goos: windows
            goarch: arm64
            output: preflight-windows-arm64.exe
          - goos: darwin
            goarch: amd64
            output: preflight-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: preflight-darwin-arm64
          - goos: linux
            goarch: amd64
            output: preflight-linux-amd64
          - goos: linux
            goarch: arm64
            output: preflight-linux-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o dist/${{ matrix.output }} .
