name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      build: ${{ steps.filter.outputs.build }}
      winrm: ${{ steps.filter.outputs.winrm }}
      posix: ${{ steps.filter.outputs.posix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            go:
              - '**/*.go'
              - go.mod
              - go.sum
              - .golangci.yml
              - .golangci.yaml
              - .golangci.toml
              - .golangci.json
              - Makefile
              - .github/workflows/ci.yml
            winrm:
              - 'scripts/dev/bootstrap-winrm-vm.ps1'
              - 'install.ps1'
              - '**/target/winrm*'
              - '**/target/persistent_ps*'
              - .github/workflows/ci.yml
            posix:
              - 'test/posix/**'
              - .github/workflows/ci.yml
            build:
              - '**/*.go'
              - go.mod
              - go.sum
              - Makefile
              - install.sh
              - install.ps1
              - .goreleaser.yaml
              - .github/workflows/ci.yml
              - .github/workflows/release.yml

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./...

  test-posix-integration:
    name: POSIX Integration (${{ matrix.container }})
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.posix == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: ubuntu
            port: "2222"
            service: ubuntu
          - container: rocky
            port: "2223"
            service: rocky
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build and start ${{ matrix.container }} container
        working-directory: test/posix
        run: docker compose up -d --build ${{ matrix.service }}

      - name: Wait for sshd
        working-directory: test/posix
        run: sh wait-for-ssh.sh localhost ${{ matrix.port }} 90

      - name: Run POSIX integration tests
        env:
          PREFLIGHT_TEST_SSH_POSIX_HOST: localhost
          PREFLIGHT_TEST_SSH_POSIX_PORT: ${{ matrix.port }}
          PREFLIGHT_TEST_SSH_POSIX_USER: pf-admin
          PREFLIGHT_TEST_SSH_POSIX_PASS: preflight
        run: go test -tags integration -count=1 -run TestIntegration_POSIX -v ./internal/target/

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            output: preflight-windows-amd64.exe
          - goos: windows
            goarch: arm64
            output: preflight-windows-arm64.exe
          - goos: darwin
            goarch: amd64
            output: preflight-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: preflight-darwin-arm64
          - goos: linux
            goarch: amd64
            output: preflight-linux-amd64
          - goos: linux
            goarch: arm64
            output: preflight-linux-arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o dist/${{ matrix.output }} .
