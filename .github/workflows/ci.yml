name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      build: ${{ steps.filter.outputs.build }}
      winrm: ${{ steps.filter.outputs.winrm }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            go:
              - '**/*.go'
              - go.mod
              - go.sum
              - .golangci.yml
              - .golangci.yaml
              - .golangci.toml
              - .golangci.json
              - Makefile
              - .github/workflows/ci.yml
            winrm:
              - 'scripts/bootstrap-winrm-vm.ps1'
              - 'install.ps1'
              - '**/target/winrm*'
              - '**/target/persistent_ps*'
              - .github/workflows/ci.yml
            build:
              - '**/*.go'
              - go.mod
              - go.sum
              - Makefile
              - install.sh
              - install.ps1
              - .goreleaser.yaml
              - .github/workflows/ci.yml
              - .github/workflows/release.yml

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./...

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            output: preflight-windows-amd64.exe
          - goos: windows
            goarch: arm64
            output: preflight-windows-arm64.exe
          - goos: darwin
            goarch: amd64
            output: preflight-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: preflight-darwin-arm64
          - goos: linux
            goarch: amd64
            output: preflight-linux-amd64
          - goos: linux
            goarch: arm64
            output: preflight-linux-arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o dist/${{ matrix.output }} .
