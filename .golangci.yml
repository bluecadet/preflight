version: "2"

linters:
  default: none
  enable:
    - errcheck       # unchecked errors
    - govet          # go vet checks
    - staticcheck    # staticcheck suite
    - unused         # unused code
    - modernize      # simplification suggestions
    - ineffassign    # ineffectual assignments
    - misspell       # common spelling mistakes
    - gocritic       # various opinionated checks
  exclusions:
    rules:
      # Stubs for Windows-only modules don't need full implementations
      - path: "_stub\\.go"
        linters: [unused]

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/bluecadet/preflight
