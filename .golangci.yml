version: "2"

linters:
  default: none
  enable:
    - errcheck       # unchecked errors
    - govet          # go vet checks
    - staticcheck    # staticcheck suite
    - unused         # unused code
    - gosimple       # simplification suggestions
    - ineffassign    # ineffectual assignments
    - gofmt          # formatting
    - goimports      # import ordering
    - misspell       # common spelling mistakes
    - gocritic       # various opinionated checks

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/claytercek/preflight

issues:
  exclude-rules:
    # Stubs for Windows-only modules don't need full implementations
    - path: "_stub\\.go"
      linters: [unused]
